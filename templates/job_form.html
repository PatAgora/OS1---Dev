{% extends "base.html" %}
{% block title %}{{ 'Edit Job' if job else 'New Job' }}{% endblock %}

{% block content %}
<div class="container-fluid px-4 pt-3 pb-4">
<div class="container-xxl">
  <h2 class="fw-bold mb-3">{{ 'Edit Job' if job else 'Create New Job' }}</h2>

  <form method="post" class="card p-3 shadow-sm border-0">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Title</label>
        <input type="text" name="title" class="form-control" value="{{ job.title if job else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Role Type</label>
        <input type="text" name="role" class="form-control" value="{{ job.role_type if job else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold">Description</label>
        <textarea name="description" class="form-control" rows="6">{{ job.description if job else '' }}</textarea>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Location</label>
        <input type="text" name="location" class="form-control" value="{{ job.location if job else '' }}" placeholder="e.g. London, UK">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Salary / Rate</label>
        <input type="text" name="salary_range" class="form-control" value="{{ job.salary_range if job else '' }}" placeholder="e.g. £250/day">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Status</label>
        <select name="status" class="form-select">
          {% for s in ['Open','Closed','On Hold','Withdrawn'] %}
          <option value="{{ s }}" {{ 'selected' if job and job.status == s else '' }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary">{{ 'Update' if job else 'Create' }}</button>
      <a href="{{ url_for('engagement_dashboard', eng_id=job.engagement_id) if job and job.engagement_id else url_for('projects') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
</div>
{% endblock %}
